<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Guru - CBT Cikal Harapan</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { background-color: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: 100%; font-size: 16px; font-weight: bold;}
        .btn:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #0056b3;">Input Soal Ujian</h2>
    
    <div class="form-group">
        <label>Kode Mata Pelajaran (Contoh: soal_biologi_x)</label>
        <input type="text" id="mapel" placeholder="Masukkan ID Koleksi Ujian">
    </div>

    <div class="form-group">
        <label>Teks Soal</label>
        <textarea id="teksSoal" rows="4" placeholder="Ketik pertanyaan di sini..."></textarea>
    </div>

    <div class="form-group">
        <label>Opsi A</label>
        <input type="text" id="opsiA" placeholder="Jawaban A">
    </div>
    <div class="form-group">
        <label>Opsi B</label>
        <input type="text" id="opsiB" placeholder="Jawaban B">
    </div>
    <div class="form-group">
        <label>Opsi C</label>
        <input type="text" id="opsiC" placeholder="Jawaban C">
    </div>
    <div class="form-group">
        <label>Opsi D</label>
        <input type="text" id="opsiD" placeholder="Jawaban D">
    </div>

    <div class="form-group">
        <label>Kunci Jawaban Benar</label>
        <select id="kunciJawaban">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
        </select>
    </div>

    <div class="form-group">
    <label>Durasi Ujian (Menit)</label>
    <input type="number" id="durasiUjian" placeholder="Contoh: 60">
</div>

    <button class="btn" id="btnSimpan">Simpan Soal ke Database</button>
</div>

<script type="module" src="admin.js"></script>
</body>
</html>
